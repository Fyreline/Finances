<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- No background tile — transparent, matching the other household app
       icons (the browser tab/OS/home-screen surface shows through). -->
  <!-- Kakeibo's mark: a gamaguchi coin purse — clasp-frame dome with the two
       clasp balls on top, fat pouch below — holding the household cat mark
       where the coins live. Line-art outline (Mishka's film-camera
       technique) so the solid crimson cat badge stays legible inside the
       open paper-white pouch; hardcoded colours since favicons can't read
       CSS variables. Keep KakeiboMark.tsx in step with this geometry. -->
  <!-- The wrapper nudge centres the painted extents in the viewBox: the
       glyph spans y 3.1–27.95 as drawn, so +0.5 puts its centre on y=16
       (x is symmetric about 16 already). -->
  <g transform="translate(0 0.5)">
    <circle cx="14.2" cy="4.8" r="1.7" fill="#c33c54" />
    <circle cx="17.8" cy="4.8" r="1.7" fill="#c33c54" />
    <path d="M 6,14 A 10,8 0 0 1 26,14" fill="none" stroke="#c33c54" stroke-width="2" stroke-linecap="round" />
    <path d="M 6,14 L 26,14" fill="none" stroke="#c33c54" stroke-width="2" stroke-linecap="round" />
    <path d="M 6,14 C 4.2,20.5 6.8,27 16,27 C 25.2,27 27.8,20.5 26,14" fill="none" stroke="#c33c54" stroke-width="2" stroke-linecap="round" />
    <!-- The household cat mark, centered in the pouch -->
    <g transform="translate(10.08,15.41) scale(0.37)">
      <path
        d="M4,9 L2,1.5 L10,7.5 Q16,4 22,7.5 L30,1.5 L28,9 Q30.5,14.5 28,20 Q24.5,26 16,26 Q7.5,26 4,20 Q1.5,14.5 4,9 Z"
        fill="#c33c54"
      />
      <circle cx="12" cy="16.5" r="1.6" fill="#f7fbfa" />
      <circle cx="20" cy="16.5" r="1.6" fill="#f7fbfa" />
      <path d="M15,20 L17,20 L16,21.3 Z" fill="#f7fbfa" />
    </g>
  </g>
</svg>
