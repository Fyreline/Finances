<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20'%3E%3Crect x='2' y='2' width='16' height='16' rx='3' fill='%23c33c54'/%3E%3Ctext x='10' y='14.5' font-size='11' text-anchor='middle' fill='%23f7fbfa' font-family='sans-serif'%3E家%3C/text%3E%3C/svg%3E"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f7fbfa" />
    <title>Kakeibo</title>
    <script>
      // Apply the theme class before first paint to avoid a flash of the
      // wrong theme. Mirrors src/components/ThemeToggle.tsx: explicit
      // localStorage choice wins, otherwise fall back to the OS
      // `prefers-color-scheme` on first visit.
      (function () {
        try {
          var stored = localStorage.getItem('kakeibo-theme');
          var dark = stored ? stored === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
