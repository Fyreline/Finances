<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20'%3E%3Crect x='2' y='2' width='16' height='16' rx='3' fill='%23c33c54'/%3E%3Ctext x='10' y='14.5' font-size='11' text-anchor='middle' fill='%23f7fbfa' font-family='sans-serif'%3E家%3C/text%3E%3C/svg%3E"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f7fbfa" />
    <!-- Home-screen install icon (2026-07-11 follow-up — "Add to Home
         Screen" was falling back to a generic icon with none of this
         wired up). %BASE_URL% is Vite's own token for index.html, resolving
         to '/' in dev and '/Finances/' in the GitHub Pages build
         (VITE_BASE, docs/ARCHITECTURE.md §2) — the same base every bundled
         asset URL already gets, applied here by hand since these are raw
         <link> tags, not imports. apple-touch-icon is iOS Safari's own
         non-standard, PNG-only, manifest-ignoring mechanism — Safari does
         not read the Web App Manifest's icons for the home-screen icon, so
         this tag is required in addition to, not instead of, the manifest. -->
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon.png" />
    <title>Kakeibo</title>
    <script>
      // Apply the theme class before first paint to avoid a flash of the
      // wrong theme. Mirrors src/components/ThemeToggle.tsx: explicit
      // localStorage choice wins, otherwise fall back to the OS
      // `prefers-color-scheme` on first visit.
      (function () {
        try {
          var stored = localStorage.getItem('kakeibo-theme');
          var dark = stored ? stored === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
